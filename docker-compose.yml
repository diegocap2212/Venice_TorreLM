version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venice
      POSTGRES_PASSWORD: venice_dev_password
      POSTGRES_DB: venice_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venice"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
